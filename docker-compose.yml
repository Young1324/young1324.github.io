services:
  jekyll:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: young1324-github-io-dev
    ports:
      - "4000:4000"
      - "35729:35729"
    volumes:
      - .:/app:cached
      - /app/node_modules
      - /app/vendor/bundle
    environment:
      - JEKYLL_ENV=development
    stdin_open: true
    tty: true
    command: >
      sh -c "git config --global --add safe.directory /app && bundle install && npm install && bundle exec jekyll serve --host 0.0.0.0 --livereload --incremental"
